<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Boston House Price Predictor</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('https://images.unsplash.com/photo-1568605114967-8130f3a36994') no-repeat center center/cover;
    }

    .container {
      width: 95%;
      max-width: 900px;
      padding: 20px;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      text-align: center;
      color: white;
    }

    h1 {
      margin-bottom: 15px;
      font-size: 22px;
    }

    form {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    input {
      padding: 8px;
      border-radius: 6px;
      border: none;
      outline: none;
      font-size: 12px;
    }

    input:focus {
      box-shadow: 0 0 5px rgba(255,255,255,0.8);
    }

    button {
      grid-column: span 3;
      padding: 10px;
      margin-top: 5px;
      border: none;
      border-radius: 8px;
      background: #4CAF50;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #45a049;
    }

    .result {
      margin-top: 10px;
      padding: 8px;
      border-radius: 8px;
      background: rgba(0,0,0,0.4);
      font-size: 14px;
    }

  </style>
</head>

<body>

<div class="container">
  <h1>🏡 Boston House Price Prediction</h1>

  <form action="{{ url_for('predict')}}" method="post">

    <input type="text" name="CRIM" placeholder="CRIM" required />
    <input type="text" name="ZN" placeholder="ZN" required />
    <input type="text" name="INDUS" placeholder="INDUS" required />

    <input type="text" name="CHAS" placeholder="CHAS" required />
    <input type="text" name="NOX" placeholder="NOX" required />
    <input type="text" name="RM" placeholder="RM" required />

    <input type="text" name="Age" placeholder="Age" required />
    <input type="text" name="DIS" placeholder="DIS" required />
    <input type="text" name="RAD" placeholder="RAD" required />

    <input type="text" name="TAX" placeholder="TAX" required />
    <input type="text" name="PTRATIO" placeholder="PTRATIO" required />
    <input type="text" name="B" placeholder="B" required />

    <input type="text" name="LSTAT" placeholder="LSTAT" required />

    <button type="submit">Predict</button>
  </form>

  {% if prediction_text %}
  <div class="result">
    {{ prediction_text }}
  </div>
  {% endif %}

</div>

</body>
</html>
